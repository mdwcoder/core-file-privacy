before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: cfp
    main: ./cmd/cfp
    binary: cfp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/core-file-privacy/core-file-privacy/internal/version.Version={{.Version}}
      - -X github.com/core-file-privacy/core-file-privacy/internal/version.BuildDate={{.Date}}
      - -X github.com/core-file-privacy/core-file-privacy/internal/version.Commit={{.Commit}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "cfp_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - SECURITY.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: yourusername
    name: core-file-privacy
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
